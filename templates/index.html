<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雷池智能问答助手</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --bg-gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            --bg-gradient-2: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --glass-bg: rgba(255, 255, 255, 0.92);
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.15);
            --user-msg-bg: linear-gradient(135deg, #6366f1, #4f46e5);
            --bot-msg-bg: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --success-color: #10b981;
            --danger-color: #ef4444;
        }

        [data-theme="dark"] {
            --glass-bg: rgba(30, 41, 59, 0.92);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.5);
            --bot-msg-bg: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #475569;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-gradient-1);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        [data-theme="dark"] body {
            background: linear-gradient(135deg, #1e293b 0%, #334155 50%, #475569 100%);
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* 背景动画层 */
        #bg-gradient-lottie {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.3;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 960px;
            height: 92vh;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        /* Header */
        .header {
            padding: 20px 28px;
            background: var(--glass-bg);
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }

        .header-text h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 3px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-text p {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .header-actions {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 24px;
            font-size: 13px;
            color: var(--success-color);
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success-color);
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 8px var(--success-color);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        .header-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            color: var(--primary-color);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            transform: scale(1.05);
        }

        .header-btn:active {
            transform: scale(0.95);
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            scroll-behavior: smooth;
            background: transparent;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--text-secondary);
            border-radius: 3px;
            opacity: 0.3;
        }

        .message {
            display: flex;
            gap: 14px;
            margin-bottom: 24px;
            animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }

        .message.user .avatar {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
        }

        .message.bot .avatar {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .message-content {
            max-width: 72%;
        }

        .message.user .message-content {
            align-items: flex-end;
        }

        .message-bubble {
            padding: 16px 20px;
            border-radius: 20px;
            line-height: 1.7;
            font-size: 15px;
            position: relative;
            box-shadow: var(--shadow-sm);
        }

        .message.user .message-bubble {
            background: var(--user-msg-bg);
            color: white;
            border-bottom-right-radius: 6px;
            border-top-right-radius: 6px;
        }

        .message.bot .message-bubble {
            background: var(--bot-msg-bg);
            color: var(--text-primary);
            border-bottom-left-radius: 6px;
            border-top-left-radius: 6px;
            border: 1px solid var(--border-color);
        }

        /* Markdown样式 */
        .message-bubble h1,
        .message-bubble h2,
        .message-bubble h3 {
            margin-top: 12px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .message-bubble h1 { font-size: 1.4em; }
        .message-bubble h2 { font-size: 1.2em; }
        .message-bubble h3 { font-size: 1.1em; }

        .message-bubble p {
            margin-bottom: 10px;
        }

        .message-bubble p:last-child {
            margin-bottom: 0;
        }

        .message-bubble ul,
        .message-bubble ol {
            margin: 10px 0;
            padding-left: 24px;
        }

        .message-bubble li {
            margin-bottom: 6px;
        }

        .message-bubble code {
            background: rgba(0, 0, 0, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
        }

        .message.user .message-bubble code {
            background: rgba(255, 255, 255, 0.2);
        }

        .message-bubble pre {
            background: #1e293b;
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
            overflow-x: auto;
        }

        .message-bubble pre code {
            background: transparent;
            padding: 0;
            font-size: 14px;
            line-height: 1.6;
        }

        .message-bubble blockquote {
            border-left: 4px solid var(--primary-color);
            padding-left: 16px;
            margin: 12px 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        .llm-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 8px;
            opacity: 0.7;
        }

        .message.user .message-time {
            text-align: right;
        }

        /* Message Actions */
        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            position: relative;
        }

        .action-btn {
            padding: 6px 14px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--bot-msg-bg);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .action-btn.like:hover {
            background: var(--success-color);
            color: white;
            border-color: var(--success-color);
        }

        .action-btn.dislike:hover {
            background: var(--danger-color);
            color: white;
            border-color: var(--danger-color);
        }

        .action-btn.liked {
            background: var(--success-color);
            color: white;
            border-color: var(--success-color);
        }

        .action-btn.disliked {
            background: var(--danger-color);
            color: white;
            border-color: var(--danger-color);
        }

        /* Sources */
        .sources {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border-color);
        }

        .sources-title {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .source-item {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 8px;
            font-size: 13px;
            border-left: 3px solid var(--primary-color);
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .source-item:hover {
            transform: translateX(4px);
            box-shadow: var(--shadow-sm);
        }

        .source-item p {
            color: inherit;
            margin: 0;
        }

        /* Input Area */
        .input-area {
            padding: 20px 28px;
            background: var(--glass-bg);
            border-top: 1px solid var(--border-color);
            position: relative;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            background: var(--glass-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 10px 12px;
            align-items: flex-end;
            transition: all 0.2s ease;
        }

        .input-wrapper.focused {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .input-wrapper textarea {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 14px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            resize: none;
            color: var(--text-primary);
            max-height: 120px;
            line-height: 1.5;
        }

        .input-wrapper textarea::placeholder {
            color: var(--text-secondary);
        }

        /* 图片上传按钮 */
        .image-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            color: var(--primary-color);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
        }

        .image-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            transform: scale(1.05);
        }

        .image-btn.has-image {
            color: var(--success-color);
            background: rgba(16, 185, 129, 0.1);
            animation: imageBtnBounce 0.6s ease-in-out infinite;
        }

        @keyframes imageBtnBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        #image-input {
            display: none;
        }

        /* 图片预览区域 */
        .image-preview-container {
            display: none;
            padding: 12px;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            margin-bottom: 12px;
            position: relative;
            align-items: center;
            gap: 12px;
        }

        .image-preview-container.active {
            display: flex;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .image-preview {
            max-width: 140px;
            max-height: 90px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: var(--shadow-sm);
        }

        .image-preview-info {
            flex: 1;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .image-preview-remove {
            width: 28px;
            height: 28px;
            border: none;
            background: var(--danger-color);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .image-preview-remove:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-sm);
        }

        .input-area.dragover {
            background: rgba(99, 102, 241, 0.05);
        }

        .input-area.dragover .input-wrapper {
            border-color: var(--primary-color);
            border-style: dashed;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border: none;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            border-radius: 14px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            background: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Welcome Message */
        .welcome-message {
            text-align: center;
            padding: 60px 30px;
            color: var(--text-secondary);
        }

        #lottie-container {
            width: 220px;
            height: 220px;
            margin: 0 auto 30px;
        }

        .welcome-message h2 {
            color: var(--text-primary);
            font-size: 26px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .welcome-message p {
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        /* OCR Result */
        .ocr-result-container {
            padding: 12px;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .ocr-result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .ocr-result-toggle {
            background: transparent;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .ocr-result-toggle:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .ocr-result-text {
            width: 100%;
            min-height: 60px;
            max-height: 150px;
            padding: 12px;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            resize: none;
            outline: none;
            font-family: inherit;
        }

        /* Loading States */
        #loading-lottie {
            display: none;
            width: 60px;
            height: 60px;
            margin: 20px auto;
        }

        #sending-lottie {
            display: none;
            width: 40px;
            height: 40px;
            margin: 10px auto;
        }

        #complete-lottie {
            display: none;
            width: 50px;
            height: 50px;
            margin: 10px auto;
        }

        /* Action Lottie */
        .action-lottie {
            position: absolute;
            width: 40px;
            height: 40px;
            pointer-events: none;
            display: none;
        }

        .action-lottie.play {
            display: block;
        }

        .focus-lottie {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        .image-success-lottie {
            position: absolute;
            right: -10px;
            top: -10px;
            width: 40px;
            height: 40px;
            display: none;
        }

        .image-success-lottie.play {
            display: block;
        }

        .send-btn-lottie {
            width: 24px;
            height: 24px;
        }

        /* 发送按钮动画 */
        @keyframes sendBtnPulse {
            0% { transform: scale(1); }
            50% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        .send-btn.sending {
            animation: sendBtnPulse 0.5s ease-in-out infinite;
        }

        /* Mobile Responsive */
        @media (max-width: 640px) {
            body {
                padding: 0;
            }

            .container {
                height: 100vh;
                max-width: 100%;
                border-radius: 0;
                border: none;
            }

            .message-content {
                max-width: 85%;
            }

            .header {
                padding: 14px 20px;
            }

            .header-text h1 {
                font-size: 18px;
            }

            .header-text p {
                display: none;
            }

            .chat-container {
                padding: 16px 20px;
            }

            .input-area {
                padding: 16px 20px;
            }

            .welcome-message {
                padding: 40px 20px;
            }

            .welcome-message h2 {
                font-size: 22px;
            }
        }

        /* 主题切换动画 */
        .theme-toggle {
            position: relative;
            overflow: hidden;
        }

        .theme-toggle::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        .theme-toggle:active::before {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body data-theme="light">
    <div class="container">
        <div class="header">
            <div class="logo" id="header-logo">☁️</div>
            <div class="header-text">
                <h1>雷池智能问答助手</h1>
                <p>您的WAF问题解答专家</p>
            </div>
            <div class="header-actions">
                <div class="status-badge">
                    <span class="status-dot"></span>
                    <span id="knowledge-count">加载中...</span>
                </div>
                <button class="header-btn theme-toggle" onclick="toggleTheme()" title="切换主题">
                    <span id="theme-icon">🌙</span>
                </button>
                <button class="header-btn" onclick="clearConversation()" title="清空对话">🔄</button>
            </div>
        </div>

        <div class="chat-container" id="chat-container">
            <div class="welcome-message" id="welcome-message">
                <div id="lottie-container"></div>
                <h2>您好，欢迎使用雷池智能问答助手</h2>
                <p>我可以帮您解答关于雷池WAF的各种问题，包括配置、部署、故障排查等</p>
            </div>
            <div id="loading-lottie"></div>
            <div id="sending-lottie"></div>
            <div id="complete-lottie"></div>
        </div>

        <div class="input-area" id="input-area">
            <div id="focus-lottie" class="focus-lottie"></div>

            <div class="image-preview-container" id="image-preview-container">
                <img src="" alt="预览" class="image-preview" id="image-preview">
                <div class="image-preview-info" id="image-preview-info"></div>
                <button class="image-preview-remove" onclick="removeImage()">×</button>
                <div id="image-success-lottie" class="image-success-lottie"></div>
            </div>

            <div id="ocr-result-container" class="ocr-result-container" style="display: none;">
                <div class="ocr-result-header">
                    <span>📝 识别到的文字</span>
                    <button class="ocr-result-toggle" onclick="toggleOcrResult()">显示/隐藏</button>
                </div>
                <textarea id="ocr-result-text" class="ocr-result-text" readonly placeholder="识别结果将显示在这里..."></textarea>
            </div>

            <div class="input-wrapper">
                <textarea id="user-input" placeholder="请输入您的问题，或上传图片..." rows="1" autocomplete="off"></textarea>
                <button class="image-btn" id="image-btn" onclick="document.getElementById('image-input').click()" title="上传图片">📷</button>
                <input type="file" id="image-input" accept="image/*" onchange="handleImageSelect(event)">
                <button class="send-btn" id="send-btn" onclick="sendUserMessage()">
                    <div id="send-btn-lottie" class="send-btn-lottie">➤</div>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 会话 ID（用于多轮对话上下文）
        const sessionId = 'session_' + Date.now();
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');

        // 初始化欢迎页面的Lottie动画
        const welcomeAnim = lottie.loadAnimation({
            container: document.getElementById('lottie-container'),
            renderer: 'svg',
            loop: true,
            autoplay: true,
            path: 'https://assets10.lottiefiles.com/packages/lf20_w51pcehl.json'
        });

        // 初始化加载动画
        let loadingLottie = null;
        function initLoadingLottie() {
            if (!loadingLottie) {
                loadingLottie = lottie.loadAnimation({
                    container: document.getElementById('loading-lottie'),
                    renderer: 'svg',
                    loop: true,
                    autoplay: false,
                    path: 'https://assets9.lottiefiles.com/packages/lf20_p8bfn5to.json'
                });
            }
            return loadingLottie;
        }

        // 发送中动画
        let sendingLottie = null;
        function initSendingLottie() {
            if (!sendingLottie) {
                sendingLottie = lottie.loadAnimation({
                    container: document.getElementById('sending-lottie'),
                    renderer: 'svg',
                    loop: true,
                    autoplay: false,
                    path: 'https://assets2.lottiefiles.com/packages/lf20_jbrw3hcz.json'
                });
            }
            return sendingLottie;
        }

        // 回答完成动画
        let completeLottie = null;
        function initCompleteLottie() {
            if (!completeLottie) {
                completeLottie = lottie.loadAnimation({
                    container: document.getElementById('complete-lottie'),
                    renderer: 'svg',
                    loop: false,
                    autoplay: false,
                    path: 'https://assets1.lottiefiles.com/packages/lf20_jvkxcphh.json'
                });
            }
            return completeLottie;
        }

        // 图片相关变量
        let selectedImage = null;
        let selectedImageBase64 = null;
        let manualInputText = '';
        let ocrResult = '';

        const MAX_IMAGE_SIZE = 4 * 1024 * 1024;
        const MAX_IMAGE_DIMENSION = 1920;

        // 初始化 - 获取知识库数量
        fetch('/api/health')
            .then(res => res.json())
            .then(data => {
                document.getElementById('knowledge-count').textContent = `${data.knowledge_count} 条知识`;
            })
            .catch(err => {
                document.getElementById('knowledge-count').textContent = '离线模式';
            });

        // 文本域自动高度
        userInput.addEventListener('input', function() {
            manualInputText = this.value;
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // 监听键盘事件
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendUserMessage();
            }
        });

        // 输入框聚焦效果
        const inputWrapper = document.querySelector('.input-wrapper');
        userInput.addEventListener('focus', () => inputWrapper.classList.add('focused'));
        userInput.addEventListener('blur', () => inputWrapper.classList.remove('focused'));

        // 主题切换
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', newTheme);
            document.getElementById('theme-icon').textContent = newTheme === 'light' ? '🌙' : '☀️';
            localStorage.setItem('theme', newTheme);
        }

        // 加载保存的主题
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.setAttribute('data-theme', savedTheme);
        document.getElementById('theme-icon').textContent = savedTheme === 'light' ? '🌙' : '☀️';

        function sendMessage(msg) {
            userInput.value = msg;
            manualInputText = msg;
            sendUserMessage();
        }

        function getCurrentTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ':' +
                   now.getMinutes().toString().padStart(2, '0');
        }

        async function clearConversation() {
            if (!confirm('确定要清空对话历史吗？')) return;

            try {
                await fetch('/api/conversation/clear', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });

                const messages = document.querySelectorAll('.message');
                messages.forEach(msg => msg.remove());

                const welcomeMessage = document.getElementById('welcome-message');
                if (welcomeMessage) welcomeMessage.style.display = 'block';

                console.log('对话历史已清空');
            } catch (err) {
                console.error('清空对话失败:', err);
                alert('清空对话失败，请重试');
            }
        }

        function createMessageElement(content, isUser, time, sources = [], matchedQuestion = null, llmUsed = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;

            const avatarIcon = isUser ? '👤' : '🤖';
            const llmBadge = llmUsed ? '<span class="llm-badge">✨ AI润色</span>' : '';

            const actions = isUser ? '' : `
                <div class="message-actions" style="position: relative;">
                    <button class="action-btn like" onclick="handleFeedback(this, 'like')">👍 有帮助</button>
                    <button class="action-btn dislike" onclick="handleFeedback(this, 'dislike')">👎 无帮助</button>
                    <div class="action-lottie like-lottie" id="like-lottie-${Date.now()}"></div>
                    <div class="action-lottie dislike-lottie" id="dislike-lottie-${Date.now()}"></div>
                </div>
            `;

            // 使用marked解析Markdown
            const parsedContent = isUser ? content : marked.parse(content);

            messageDiv.innerHTML = `
                <div class="avatar">${avatarIcon}</div>
                <div class="message-content">
                    <div class="message-bubble">${llmBadge}${parsedContent}</div>
                    ${actions}
                    <div class="message-time">${time}</div>
                </div>
            `;

            // 高亮代码块
            if (!isUser) {
                messageDiv.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            }

            return messageDiv;
        }

        function handleFeedback(btn, type) {
            const parent = btn.parentElement;
            const sibling = type === 'like' ? parent.querySelector('.dislike') : parent.querySelector('.like');
            if (sibling) {
                sibling.classList.remove('liked', 'disliked');
            }

            const isAdding = !btn.classList.contains(type === 'like' ? 'liked' : 'disliked');
            if (isAdding) {
                btn.classList.add(type === 'like' ? 'liked' : 'disliked');
                playFeedbackAnimation(parent, type);

                const botMsgDiv = parent.closest('.message.bot');
                if (botMsgDiv) {
                    const botMessage = botMsgDiv.querySelector('.message-bubble').textContent;
                    const allMessages = Array.from(chatContainer.querySelectorAll('.message.user'));
                    let userMessage = '';
                    if (allMessages.length > 0) {
                        const lastUserMsg = allMessages[allMessages.length - 1];
                        userMessage = lastUserMsg.querySelector('.message-bubble').textContent;
                    }

                    if (userMessage && botMessage) {
                        fetch('/api/feedback', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                user: userMessage,
                                bot: botMessage,
                                type: type
                            })
                        }).catch(err => console.error('反馈保存失败:', err));
                    }
                }
            } else {
                btn.classList.remove(type === 'like' ? 'liked' : 'disliked');
            }
        }

        function playFeedbackAnimation(parent, type) {
            const lottieContainer = parent.querySelector(`.${type}-lottie`);
            if (!lottieContainer) return;

            const animJson = type === 'like'
                ? 'https://assets2.lottiefiles.com/packages/lf20_9k9rmsfp.json'
                : 'https://assets9.lottiefiles.com/packages/lf20_u4yrau.json';

            const anim = lottie.loadAnimation({
                container: lottieContainer,
                renderer: 'svg',
                loop: false,
                autoplay: true,
                path: animJson
            });

            lottieContainer.classList.add('play');
            lottieContainer.style.left = type === 'like' ? '-5px' : '25px';
            lottieContainer.style.top = '-5px';

            anim.addEventListener('complete', () => {
                setTimeout(() => {
                    lottieContainer.classList.remove('play');
                    anim.destroy();
                }, 500);
            });
        }

        async function sendUserMessage() {
            const message = manualInputText.trim();
            if (!message && !selectedImageBase64) return;

            const welcomeMessage = document.getElementById('welcome-message');
            if (welcomeMessage) welcomeMessage.style.display = 'none';

            let userMessageContent = message;
            if (selectedImageBase64) {
                userMessageContent = (message ? message + '<br>' : '') + '<img src="' + selectedImageBase64 + '" style="max-width: 220px; max-height: 160px; border-radius: 10px; margin-top: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);"/>';
            }
            const userMsgElement = createMessageElement(userMessageContent, true, getCurrentTime());
            chatContainer.appendChild(userMsgElement);

            userInput.value = '';
            manualInputText = '';
            userInput.style.height = 'auto';
            removeImage();
            scrollToBottom();

            const sendingAnim = initSendingLottie();
            const sendingDiv = document.getElementById('sending-lottie');
            sendingDiv.style.display = 'block';
            sendingAnim.play();

            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;

            const botMsgDiv = document.createElement('div');
            botMsgDiv.className = 'message bot';
            botMsgDiv.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="message-content">
                    <div class="message-bubble">
                        <span class="streaming-content"></span>
                    </div>
                    <div class="message-actions" style="display: none; position: relative;">
                        <button class="action-btn like" onclick="handleFeedback(this, 'like')">👍 有帮助</button>
                        <button class="action-btn dislike" onclick="handleFeedback(this, 'dislike')">👎 无帮助</button>
                        <div class="action-lottie like-lottie" id="like-lottie-${Date.now()}"></div>
                        <div class="action-lottie dislike-lottie" id="dislike-lottie-${Date.now()}"></div>
                    </div>
                    <div class="message-time">${getCurrentTime()}</div>
                </div>
            `;
            chatContainer.appendChild(botMsgDiv);

            const loadingAnim = initLoadingLottie();
            const loadingDiv = document.getElementById('loading-lottie');
            loadingDiv.style.display = 'block';
            loadingAnim.play();

            try {
                const apiEndpoint = selectedImageBase64 ? '/api/chat_with_image' : '/api/chat';
                let requestBody;

                if (selectedImageBase64) {
                    let queryMessage;
                    if (message && ocrResult) {
                        queryMessage = message + ' ' + ocrResult;
                    } else if (message) {
                        queryMessage = message;
                    } else if (ocrResult) {
                        queryMessage = ocrResult;
                    } else {
                        queryMessage = '请描述这张图片的内容';
                    }

                    requestBody = {
                        message: queryMessage,
                        image: selectedImageBase64,
                        ocrText: ocrResult,
                        session_id: sessionId
                    };
                } else {
                    requestBody = { message, session_id: sessionId };
                }

                const response = await fetch(apiEndpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const text = decoder.decode(value);
                    const lines = text.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.type === 'chunk' && data.content) {
                                    loadingDiv.style.display = 'none';
                                    loadingAnim.stop();

                                    fullContent += data.content;
                                    const streamingContent = botMsgDiv.querySelector('.streaming-content');
                                    streamingContent.innerHTML = marked.parse(fullContent);
                                    streamingContent.querySelectorAll('pre code').forEach((block) => {
                                        hljs.highlightElement(block);
                                    });
                                    scrollToBottom();
                                }
                            } catch (e) {}
                        }
                    }
                }

            } catch (error) {
                loadingDiv.style.display = 'none';
                loadingAnim.stop();
                sendingDiv.style.display = 'none';
                sendingAnim.stop();
                botMsgDiv.querySelector('.streaming-content').textContent = '抱歉，当前服务暂时不可用，请稍后重试。';
            }

            loadingDiv.style.display = 'none';
            loadingAnim.stop();
            sendingDiv.style.display = 'none';
            sendingAnim.stop();

            const completeAnim = initCompleteLottie();
            const completeDiv = document.getElementById('complete-lottie');
            completeDiv.style.display = 'block';
            completeAnim.play();
            setTimeout(() => {
                completeDiv.style.display = 'none';
                completeAnim.stop();
            }, 1500);

            botMsgDiv.querySelector('.message-actions').style.display = 'flex';

            const botContent = botMsgDiv.querySelector('.streaming-content').textContent || '抱歉，服务暂时不可用';
            try {
                await fetch('/api/history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user: message, bot: botContent })
                });
            } catch (err) {
                console.error('保存聊天记录失败:', err);
            }

            sendBtn.disabled = false;
            scrollToBottom();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 图片处理函数
        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件');
                return;
            }

            if (file.size > MAX_IMAGE_SIZE) {
                alert('图片大小不能超过4MB');
                return;
            }

            compressImage(file);
        }

        function compressImage(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_IMAGE_DIMENSION || height > MAX_IMAGE_DIMENSION) {
                        const ratio = Math.min(MAX_IMAGE_DIMENSION / width, MAX_IMAGE_DIMENSION / height);
                        width = Math.round(width * ratio);
                        height = Math.round(height * ratio);
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    selectedImageBase64 = compressedDataUrl;
                    selectedImage = file;

                    showImagePreview(compressedDataUrl, file.name, file.size);
                    recognizeImageText(compressedDataUrl);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function recognizeImageText(imageData) {
            try {
                const response = await fetch('/api/ocr', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.text && data.text !== '没有识别到文字') {
                        ocrResult = data.text;

                        const currentText = manualInputText.trim();

                        if (!currentText) {
                            userInput.value = data.text;
                            manualInputText = data.text;
                            userInput.style.height = 'auto';
                            userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
                        } else {
                            const ocrContainer = document.getElementById('ocr-result-container');
                            const ocrText = document.getElementById('ocr-result-text');
                            ocrText.value = data.text;
                            ocrContainer.style.display = 'block';
                        }

                        userInput.focus();
                    }
                }
            } catch (err) {
                console.error('OCR识别失败:', err);
            }
        }

        function toggleOcrResult() {
            const ocrText = document.getElementById('ocr-result-text');
            ocrText.classList.toggle('visible');
        }

        let focusAnim = null;
        function handleInputFocus() {
            inputWrapper.classList.add('focused');

            const focusContainer = document.getElementById('focus-lottie');
            if (!focusAnim) {
                focusAnim = lottie.loadAnimation({
                    container: focusContainer,
                    renderer: 'svg',
                    loop: true,
                    autoplay: false,
                    path: 'https://assets3.lottiefiles.com/packages/lf20_9k9rmsfp.json'
                });
            }
            focusAnim.play();
        }

        function handleInputBlur() {
            inputWrapper.classList.remove('focused');

            if (focusAnim) {
                focusAnim.stop();
            }
        }

        let sendBtnAnim = null;
        function playSendButtonAnim() {
            const sendBtn = document.getElementById('send-btn');
            const sendBtnLottieContainer = document.getElementById('send-btn-lottie');

            sendBtn.classList.add('sending');

            if (!sendBtnAnim) {
                sendBtnAnim = lottie.loadAnimation({
                    container: sendBtnLottieContainer,
                    renderer: 'svg',
                    loop: false,
                    autoplay: false,
                    path: 'https://assets9.lottiefiles.com/packages/lf20_u4yrau.json'
                });
            }
            sendBtnAnim.play();

            sendBtnAnim.addEventListener('complete', () => {
                sendBtn.classList.remove('sending');
            });
        }

        let imageSuccessAnim = null;
        function playImageSuccessAnim() {
            const container = document.getElementById('image-preview-container');
            const successContainer = document.getElementById('image-success-lottie');

            successContainer.classList.add('play');

            if (!imageSuccessAnim) {
                imageSuccessAnim = lottie.loadAnimation({
                    container: successContainer,
                    renderer: 'svg',
                    loop: false,
                    autoplay: false,
                    path: 'https://assets2.lottiefiles.com/packages/lf20_9k9rmsfp.json'
                });
            }
            imageSuccessAnim.play();

            imageSuccessAnim.addEventListener('complete', () => {
                successContainer.classList.remove('play');
            });
        }

        function showImagePreview(dataUrl, filename, filesize) {
            const container = document.getElementById('image-preview-container');
            const preview = document.getElementById('image-preview');
            const info = document.getElementById('image-preview-info');
            const imageBtn = document.getElementById('image-btn');

            preview.src = dataUrl;
            const sizeStr = filesize > 1024 * 1024
                ? (filesize / (1024 * 1024)).toFixed(1) + 'MB'
                : (filesize / 1024).toFixed(1) + 'KB';
            info.textContent = `${filename} (${sizeStr})`;

            container.classList.add('active');
            imageBtn.classList.add('has-image');

            playImageSuccessAnim();
        }

        function removeImage() {
            selectedImage = null;
            selectedImageBase64 = null;
            ocrResult = '';

            const container = document.getElementById('image-preview-container');
            const imageBtn = document.getElementById('image-btn');
            const imageInput = document.getElementById('image-input');
            const ocrContainer = document.getElementById('ocr-result-container');
            const ocrText = document.getElementById('ocr-result-text');

            container.classList.remove('active');
            imageBtn.classList.remove('has-image');
            imageInput.value = '';

            ocrContainer.style.display = 'none';
            ocrText.value = '';
        }

        // 拖拽上传支持
        const inputArea = document.getElementById('input-area');

        inputArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            inputArea.classList.add('dragover');
        });

        inputArea.addEventListener('dragleave', function(e) {
            e.preventDefault();
            inputArea.classList.remove('dragover');
        });

        inputArea.addEventListener('drop', function(e) {
            e.preventDefault();
            inputArea.classList.remove('dragover');

            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('image/')) {
                const file = files[0];
                if (file.size <= MAX_IMAGE_SIZE) {
                    compressImage(file);
                } else {
                    alert('图片大小不能超过4MB');
                }
            }
        });
    </script>
</body>
</html>
