<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雷池智能问答助手</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-dark: #2563eb;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --user-msg-bg: #3b82f6;
            --bot-msg-bg: #f3f4f6;
            --border-radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* 背景动画层 */
        #bg-gradient-lottie {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: var(--glass-bg);
            border-radius: 24px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        /* Header */
        .header {
            padding: 20px 30px;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .header-text h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header-text p {
            font-size: 12px;
            opacity: 0.8;
        }

        .status-badge {
            margin-left: auto;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }

        .message.bot .avatar {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .message-content {
            max-width: 70%;
        }

        .message.user .message-content {
            align-items: flex-end;
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: var(--border-radius);
            line-height: 1.6;
            font-size: 14px;
            position: relative;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-bubble {
            background: var(--bot-msg-bg);
            color: #1f2937;
            border-bottom-left-radius: 4px;
            padding: 16px 20px;
            line-height: 1.8;
        }

        .message-bubble p {
            margin-bottom: 8px;
        }

        .message-bubble p:last-child {
            margin-bottom: 0;
        }

        .llm-badge {
            display: inline-block;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            margin-bottom: 8px;
        }

        .message-time {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 6px;
        }

        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .action-btn {
            padding: 4px 10px;
            border: none;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #e5e7eb;
            color: #6b7280;
        }

        .action-btn:hover {
            transform: scale(1.05);
        }

        .action-btn.like:hover {
            background: #10b981;
            color: white;
        }

        .action-btn.dislike:hover {
            background: #ef4444;
            color: white;
        }

        .action-btn.liked {
            background: #10b981;
            color: white;
        }

        .action-btn.disliked {
            background: #ef4444;
            color: white;
        }

        .message.user .message-time {
            text-align: right;
        }

        /* Sources */
        .sources {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e5e7eb;
        }

        .sources-title {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .source-item {
            background: #f9fafb;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            font-size: 13px;
            border-left: 3px solid #3b82f6;
        }

        .source-item p {
            color: #374151;
        }

        /* Input Area */
        .input-area {
            padding: 20px 30px;
            background: white;
            border-top: 1px solid #e5e7eb;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            background: #f3f4f6;
            border-radius: 16px;
            padding: 8px;
            align-items: flex-end;
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 16px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: #9ca3af;
        }

        /* 图片上传按钮 */
        .image-btn {
            width: 48px;
            height: 48px;
            border: none;
            background: transparent;
            border-radius: 12px;
            color: #6b7280;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .image-btn:hover {
            background: #e5e7eb;
            color: #3b82f6;
        }

        .image-btn.has-image {
            color: #3b82f6;
            background: #eff6ff;
        }

        /* 隐藏的文件输入 */
        #image-input {
            display: none;
        }

        /* 图片预览区域 */
        .image-preview-container {
            display: none;
            padding: 10px;
            background: #f9fafb;
            border-radius: 12px;
            margin-bottom: 10px;
            position: relative;
        }

        .image-preview-container.active {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .image-preview {
            max-width: 120px;
            max-height: 80px;
            border-radius: 8px;
            object-fit: cover;
        }

        .image-preview-info {
            flex: 1;
            font-size: 12px;
            color: #6b7280;
        }

        .image-preview-remove {
            width: 24px;
            height: 24px;
            border: none;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        /* 拖拽区域 */
        .input-area.dragover {
            background: #eff6ff;
        }

        .input-area.dragover .input-wrapper {
            border: 2px dashed #3b82f6;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 12px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .send-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Welcome Message */
        .welcome-message {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .welcome-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .welcome-message h2 {
            color: #1f2937;
            font-size: 24px;
            margin-bottom: 12px;
        }

        .welcome-message p {
            font-size: 14px;
            line-height: 1.8;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }

        .suggestion-btn {
            padding: 10px 18px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            font-size: 13px;
            color: #4b5563;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .suggestion-btn:hover {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        /* Mobile Responsive */
        @media (max-width: 640px) {
            body {
                padding: 0;
            }

            .container {
                height: 100vh;
                max-width: 100%;
                border-radius: 0;
            }

            .message-content {
                max-width: 85%;
            }

            .header {
                padding: 15px 20px;
            }

            .chat-container {
                padding: 15px 20px;
            }

            .input-area {
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo" id="header-logo"></div>
            <div class="header-text">
                <h1>雷池智能问答助手</h1>
                <p>您的WAF问题解答专家</p>
            </div>
            <div class="status-badge">
                <span class="status-dot"></span>
                <span id="knowledge-count">加载中...</span>
            </div>
        </div>

        <div class="chat-container" id="chat-container">
            <div class="welcome-message" id="welcome-message">
                <div id="lottie-container" style="width: 200px; height: 200px; margin: 0 auto;"></div>
                <h2>您好，欢迎使用雷池智能问答助手</h2>
                <p>请直接输入您的问题，我会尽力帮您解答。</p>
            </div>
            <!-- 加载中的Lottie动画 -->
            <div id="loading-lottie" style="display: none; width: 60px; height: 60px; margin: 20px auto;"></div>
            <!-- 发送中的Lottie动画 -->
            <div id="sending-lottie" style="display: none; width: 40px; height: 40px; margin: 10px auto;"></div>
            <!-- 回答完成的Lottie动画 -->
            <div id="complete-lottie" style="display: none; width: 50px; height: 50px; margin: 10px auto;"></div>
        </div>

        <div class="input-area" id="input-area">
            <!-- 图片预览区域 -->
            <div class="image-preview-container" id="image-preview-container">
                <img src="" alt="预览" class="image-preview" id="image-preview">
                <div class="image-preview-info" id="image-preview-info"></div>
                <button class="image-preview-remove" onclick="removeImage()">×</button>
            </div>

            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="请输入您的问题，或上传图片..." autocomplete="off" onkeypress="handleKeyPress(event)">
                <button class="image-btn" id="image-btn" onclick="document.getElementById('image-input').click()" title="上传图片">📷</button>
                <input type="file" id="image-input" accept="image/*" onchange="handleImageSelect(event)">
                <button class="send-btn" id="send-btn" onclick="sendUserMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');

        // 初始化欢迎页面的Lottie动画
        let welcomeLottie = null;
        let loadingLottie = null;

        // 欢迎动画 - 使用公共Lottie JSON
        const welcomeAnim = lottie.loadAnimation({
            container: document.getElementById('lottie-container'),
            renderer: 'svg',
            loop: true,
            autoplay: true,
            path: 'https://assets10.lottiefiles.com/packages/lf20_w51pcehl.json' // 机器人动画
        });
        welcomeLottie = welcomeAnim;

        // Header Logo Lottie 动画
        const headerLogoAnim = lottie.loadAnimation({
            container: document.getElementById('header-logo'),
            renderer: 'svg',
            loop: true,
            autoplay: true,
            path: 'https://assets10.lottiefiles.com/packages/lf20_w51pcehl.json' // 机器人动画
        });

        // 初始化加载动画
        function initLoadingLottie() {
            if (!loadingLottie) {
                loadingLottie = lottie.loadAnimation({
                    container: document.getElementById('loading-lottie'),
                    renderer: 'svg',
                    loop: true,
                    autoplay: false,
                    path: 'https://assets9.lottiefiles.com/packages/lf20_p8bfn5to.json' // 加载动画
                });
            }
            return loadingLottie;
        }

        // 发送中动画
        let sendingLottie = null;
        function initSendingLottie() {
            if (!sendingLottie) {
                sendingLottie = lottie.loadAnimation({
                    container: document.getElementById('sending-lottie'),
                    renderer: 'svg',
                    loop: true,
                    autoplay: false,
                    path: 'https://assets2.lottiefiles.com/packages/lf20_jbrw3hcz.json' // 发送中动画
                });
            }
            return sendingLottie;
        }

        // 回答完成动画
        let completeLottie = null;
        function initCompleteLottie() {
            if (!completeLottie) {
                completeLottie = lottie.loadAnimation({
                    container: document.getElementById('complete-lottie'),
                    renderer: 'svg',
                    loop: false,
                    autoplay: false,
                    path: 'https://assets1.lottiefiles.com/packages/lf20_jvkxcphh.json' // 完成动画
                });
            }
            return completeLottie;
        }
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const welcomeMessage = document.getElementById('welcome-message');

        // 图片相关变量
        let selectedImage = null;
        let selectedImageBase64 = null;
        const MAX_IMAGE_SIZE = 4 * 1024 * 1024; // 4MB
        const MAX_IMAGE_DIMENSION = 1920; // 最大边长

        // 初始化 - 获取知识库数量和历史记录
        fetch('/api/health')
            .then(res => res.json())
            .then(data => {
                document.getElementById('knowledge-count').textContent = `${data.knowledge_count} 条知识`;
            })
            .catch(err => {
                document.getElementById('knowledge-count').textContent = '离线模式';
            });

        // 页面加载时不加载历史记录，每次都是全新会话

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendUserMessage();
            }
        }

        function sendMessage(msg) {
            userInput.value = msg;
            sendUserMessage();
        }

        function getCurrentTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ':' +
                   now.getMinutes().toString().padStart(2, '0');
        }

        function createMessageElement(content, isUser, time, sources = [], matchedQuestion = null, llmUsed = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;

            const avatarIcon = isUser ? '👤' : '🤖';

            // LLM润色标识
            const llmBadge = llmUsed ? '<span class="llm-badge">✨ AI润色</span>' : '';

            // 点赞/贬低按钮（仅机器人消息显示）
            const actions = isUser ? '' : `
                <div class="message-actions">
                    <button class="action-btn like" onclick="handleFeedback(this, 'like')">👍</button>
                    <button class="action-btn dislike" onclick="handleFeedback(this, 'dislike')">👎</button>
                </div>
            `;

            messageDiv.innerHTML = `
                <div class="avatar">${avatarIcon}</div>
                <div class="message-content">
                    <div class="message-bubble">${llmBadge}${content}</div>
                    ${actions}
                    <div class="message-time">${time}</div>
                </div>
            `;

            return messageDiv;
        }

        function handleFeedback(btn, type) {
            // 移除对方的按钮状态
            const parent = btn.parentElement;
            const sibling = type === 'like' ? parent.querySelector('.dislike') : parent.querySelector('.like');
            if (sibling) {
                sibling.classList.remove('liked', 'disliked');
            }

            // 切换当前按钮状态
            if (btn.classList.contains(type === 'like' ? 'liked' : 'disliked')) {
                btn.classList.remove('liked', 'disliked');
            } else {
                btn.classList.add(type === 'like' ? 'liked' : 'disliked');
            }
        }

        async function sendUserMessage() {
            const message = userInput.value.trim();
            // 允许只发送图片，或只发送文字，或两者都发送
            if (!message && !selectedImageBase64) return;

            // 隐藏欢迎消息
            welcomeMessage.style.display = 'none';

            // 添加用户消息（带图片预览）
            let userMessageContent = message;
            if (selectedImageBase64) {
                userMessageContent = (message ? message + '<br>' : '') + '<img src="' + selectedImageBase64 + '" style="max-width: 200px; max-height: 150px; border-radius: 8px; margin-top: 8px;"/>';
            }
            const userMsgElement = createMessageElement(userMessageContent, true, getCurrentTime());
            chatContainer.appendChild(userMsgElement);

            // 清空输入框和图片
            userInput.value = '';
            removeImage();

            // 滚动到底部
            scrollToBottom();

            // 显示发送中动画
            const sendingAnim = initSendingLottie();
            const sendingDiv = document.getElementById('sending-lottie');
            sendingDiv.style.display = 'block';
            sendingAnim.play();

            // 禁用发送按钮
            sendBtn.disabled = true;

            // 创建机器人消息元素（先不显示按钮）
            const botMsgDiv = document.createElement('div');
            botMsgDiv.className = 'message bot';
            botMsgDiv.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="message-content">
                    <div class="message-bubble">
                        <span class="streaming-content"></span>
                    </div>
                    <div class="message-actions" style="display: none;">
                        <button class="action-btn like" onclick="handleFeedback(this, 'like')">👍</button>
                        <button class="action-btn dislike" onclick="handleFeedback(this, 'dislike')">👎</button>
                    </div>
                    <div class="message-time">${getCurrentTime()}</div>
                </div>
            `;
            chatContainer.appendChild(botMsgDiv);

            // 显示Lottie加载动画
            const loadingAnim = initLoadingLottie();
            const loadingDiv = document.getElementById('loading-lottie');
            loadingDiv.style.display = 'block';
            loadingAnim.play();

            try {
                // 根据是否有图片选择不同的API
                const apiEndpoint = selectedImageBase64 ? '/api/chat_with_image' : '/api/chat';
                const requestBody = selectedImageBase64
                    ? { message: message || '请描述这张图片的内容', image: selectedImageBase64 }
                    : { message };

                const response = await fetch(apiEndpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const text = decoder.decode(value);
                    const lines = text.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.type === 'chunk' && data.content) {
                                    // 收到第一个内容时停止加载动画
                                    loadingDiv.style.display = 'none';
                                    loadingAnim.stop();

                                    // 直接累加内容，不再做打字机效果（避免乱序）
                                    fullContent += data.content;
                                    botMsgDiv.querySelector('.streaming-content').textContent = fullContent;
                                    scrollToBottom();
                                }
                            } catch (e) {}
                        }
                    }
                }

            } catch (error) {
                // 错误时也停止动画
                loadingDiv.style.display = 'none';
                loadingAnim.stop();
                sendingDiv.style.display = 'none';
                sendingAnim.stop();
                botMsgDiv.querySelector('.streaming-content').textContent = '抱歉，当前服务暂时不可用，请稍后重试。';
            }

            // 完成后停止动画（如果还在播放）
            loadingDiv.style.display = 'none';
            loadingAnim.stop();
            sendingDiv.style.display = 'none';
            sendingAnim.stop();

            // 显示完成动画
            const completeAnim = initCompleteLottie();
            const completeDiv = document.getElementById('complete-lottie');
            completeDiv.style.display = 'block';
            completeAnim.play();
            // 动画结束后隐藏
            setTimeout(() => {
                completeDiv.style.display = 'none';
                completeAnim.stop();
            }, 1500);

            // 显示点赞/贬低按钮
            botMsgDiv.querySelector('.message-actions').style.display = 'flex';

            // 保存聊天记录到服务器（无论成功还是失败都要保存）
            const botContent = botMsgDiv.querySelector('.streaming-content').textContent || '抱歉，服务暂时不可用';
            console.log('保存聊天记录:', { user: message, bot: botContent });
            try {
                const saveRes = await fetch('/api/history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user: message,
                        bot: botContent
                    })
                });
                console.log('保存结果:', saveRes.status);
            } catch (err) {
                console.error('保存聊天记录失败:', err);
            }

            // 恢复发送按钮
            sendBtn.disabled = false;
            scrollToBottom();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 聚焦输入框
        userInput.focus();

        // 图片处理函数
        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 验证文件类型
            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件');
                return;
            }

            // 验证文件大小
            if (file.size > MAX_IMAGE_SIZE) {
                alert('图片大小不能超过4MB');
                return;
            }

            // 压缩并预览图片
            compressImage(file);
        }

        function compressImage(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // 计算缩放比例
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_IMAGE_DIMENSION || height > MAX_IMAGE_DIMENSION) {
                        const ratio = Math.min(MAX_IMAGE_DIMENSION / width, MAX_IMAGE_DIMENSION / height);
                        width = Math.round(width * ratio);
                        height = Math.round(height * ratio);
                    }

                    // 使用canvas压缩
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // 压缩为jpeg格式，质量0.8
                    const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    selectedImageBase64 = compressedDataUrl;
                    selectedImage = file;

                    // 显示预览
                    showImagePreview(compressedDataUrl, file.name, file.size);

                    // 自动识别图片文字
                    recognizeImageText(compressedDataUrl);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 识别图片文字
        async function recognizeImageText(imageData) {
            try {
                const response = await fetch('/api/ocr', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.text && data.text !== '没有识别到文字') {
                        // 把识别结果添加到输入框
                        const currentText = userInput.value.trim();
                        if (currentText) {
                            userInput.value = currentText + ' ' + data.text;
                        } else {
                            userInput.value = data.text;
                        }
                        // 聚焦输入框
                        userInput.focus();
                    }
                }
            } catch (err) {
                console.error('OCR识别失败:', err);
            }
        }

        function showImagePreview(dataUrl, filename, filesize) {
            const container = document.getElementById('image-preview-container');
            const preview = document.getElementById('image-preview');
            const info = document.getElementById('image-preview-info');
            const imageBtn = document.getElementById('image-btn');

            preview.src = dataUrl;
            const sizeStr = filesize > 1024 * 1024
                ? (filesize / (1024 * 1024)).toFixed(1) + 'MB'
                : (filesize / 1024).toFixed(1) + 'KB';
            info.textContent = `${filename} (${sizeStr})`;

            container.classList.add('active');
            imageBtn.classList.add('has-image');
        }

        function removeImage() {
            selectedImage = null;
            selectedImageBase64 = null;

            const container = document.getElementById('image-preview-container');
            const imageBtn = document.getElementById('image-btn');
            const imageInput = document.getElementById('image-input');

            container.classList.remove('active');
            imageBtn.classList.remove('has-image');
            imageInput.value = '';
        }

        // 拖拽上传支持
        const inputArea = document.getElementById('input-area');

        inputArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            inputArea.classList.add('dragover');
        });

        inputArea.addEventListener('dragleave', function(e) {
            e.preventDefault();
            inputArea.classList.remove('dragover');
        });

        inputArea.addEventListener('drop', function(e) {
            e.preventDefault();
            inputArea.classList.remove('dragover');

            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('image/')) {
                const file = files[0];
                if (file.size <= MAX_IMAGE_SIZE) {
                    compressImage(file);
                } else {
                    alert('图片大小不能超过4MB');
                }
            }
        });
    </script>
</body>
</html>
